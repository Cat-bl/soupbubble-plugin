# 海龟汤插件配置
# 修改本文件会热更新，无需重启

# 谜题来源
#   ai    - 每局调用大模型出题（推荐，几乎不重复）
#   local - 从 resources/soups.json 随机选择
#   mix   - 优先用 AI 出题，失败降级到本地题库
puzzleSource: mix

# 大模型配置（OpenAI 兼容接口）
ai:
  # 接口地址（完整到 /chat/completions）
  apiUrl: https://openai/v1/chat/completions
  # API Key
  apiKey: ""
  # 模型名
  model: gemini-2.5-flash
  # 请求超时时间（秒）
  timeout: 120
  # 重试次数（出题失败时最多重试几次）
  retryCount: 3
  # 出题温度（越高越随机，建议 0.9-1.2）
  temperature: 1.1
  # 出题系统提示词
  puzzleSystemPrompt: |-
    你是"海龟汤"（情境猜谜/水平思考）游戏的出题助手。
    你需要生成一个悬疑、有趣、出人意料的谜题。
    汤面：一个简短、引人好奇的情境描述（2-4句话），引起玩家悬念
    汤底：完整的故事真相，解释汤面中的所有疑点，情理之中但意料之外

    要求：
    1. 汤面必须引发强烈好奇心，让人想"为什么？怎么做到的？"
    2. 汤底必须合理解释汤面的所有疑点，不能有逻辑漏洞
    3. 谜题适合在群聊中通过"是/否"问题逐步推理
    4. 难度随机选取：简单（一眼看穿）、中等（需要一定推理）或困难（非常隐晦），三种难度都要均衡出现
    5. 避免血腥、恐怖、政治敏感内容
    6. 只能返回 JSON，不要任何解释：{"soup":"汤面内容","bottom":"汤底内容","difficulty":"简单|中等|困难"}

  # 出题用户提示词
  puzzleUserPrompt: 请生成一个海龟汤谜题（汤面+汤底）。直接返回 JSON，不要解释。

  # AI 裁判系统提示词（用于回答玩家的提问）
  judgeSystemPrompt: |-
    你正在主持一场"海龟汤"（情境猜谜）游戏。你已经知道完整的故事真相（汤底）。

    现在玩家提出了一个问题，你需要根据汤底判断答案。

    回答规则：
    - 回答"是"：如果问题描述的条件在汤底中是成立的
    - 回答"不是"：如果问题描述的条件在汤底中是不成立的
    - 回答"无关"：如果问题描述的条件与汤底的故事无关，在汤底中未提到，且对故事走向没有影响

    注意：
    1. 只回答关于事实的问题，不要直接透露汤底
    2. 回答要简洁，只返回 JSON，不要解释
    3. 如果玩家的提问已经接近汤底的核心，也不要直接确认"你猜对了"，按规则正常回答
    4. 返回格式：{"answer":"是|不是|无关","hint":"可选的一句话提示，引导玩家思考"}

  # AI 猜汤底判断提示词（用于判断玩家的最终猜测是否正确）
  guessSystemPrompt: |-
    你正在主持一场"海龟汤"（情境猜谜）游戏。玩家现在尝试猜测完整的汤底故事。

    请将玩家的猜测与真正的汤底比较：
    - 如果玩家的猜测与汤底核心真相基本一致（表达方式可以不同，但核心逻辑对），返回 correct: true
    - 如果只是部分接近但不完全对，返回 correct: false 并给出简短提示
    - 如果完全不沾边，返回 correct: false

    返回 JSON：{"correct":true|false,"comment":"简短的评判说明"}

# 游戏参数
game:
  # 最少玩家数（至少 2 人）
  minPlayers: 2
  # 最多玩家数
  maxPlayers: 20
  # 等待阶段总超时（秒），发起后超时仍未开始则自动结束
  waitTimeout: 300
  # 游戏总超时（秒），开始后超时自动揭晓答案结束
  gameTimeout: 600
  # 超时前多少秒 @ 提醒一次，设为 0 关闭
  warnBefore: 30
  # 渲染图中最多保留的聊天消息条数
  maxMessages: 40
  # 正确猜出汤底的积分
  solveScore: 5
  # AI 裁判回答"无关"也算在提问次数限制中，单个玩家最多提问次数（0=不限）
  maxQuestionsPerPlayer: 0
